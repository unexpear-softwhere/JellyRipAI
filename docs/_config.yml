# GitHub Pages — Jekyll config for the published JellyRip AI site.
# Source: main branch, /docs folder.

title: JellyRip AI
description: >-
  AI-assisted fork of JellyRip.  Adds a chat sidebar and integrations
  with Anthropic Claude, OpenAI, Google Gemini, and Ollama on top of
  the disc-ripping core.
theme: jekyll-theme-cayman
show_downloads: false

# GitHub Pages project sites live under /<repo>/, not at the user/org
# apex.  Jekyll's {% link %} tag and relative_url filter both honor
# this, so internal nav links resolve correctly instead of 404'ing
# at the apex domain.
url: https://unexpear-softwhere.github.io
baseurl: /JellyRipAI

# AI BRANCH's docs/ is already curated for public consumption — no
# internal handoff or smoke-report material lives in here, so the
# exclude list is empty.  Add entries if that ever changes.
exclude: []

defaults:
  - scope:
      path: ""
    values:
      layout: default
